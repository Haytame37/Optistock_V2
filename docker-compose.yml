version: "3.9"

services:

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env          # loads all secrets — nothing is hardcoded here
    volumes:
      - ./backend/database:/app/database   # bind mount syncs local database in real-time
    networks:
      - optistock_net
    restart: unless-stopped

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - optistock_net
    restart: unless-stopped



# ── Explicit bridge network ───────────────────────────────────────────────────
networks:
  optistock_net:
    driver: bridge
